name: Run Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    name: Linux Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run BATS tests
        run: ./test/libs/bats-core/bin/bats test/
